name: Verify reproducibility
on:
  workflow_call:
    inputs:
      submodules:
        required: false
        type: boolean
        default: false
      release:
        required: false
        type: string
        default: deb
      reusable-ref:
        # There's a race present when using a branch name as ref.
        # The branch could move between the time this yaml is retrieved and
        # the time when "workflow scripts" are being checked out.
        required: false
        type: string
        default: master
    secrets:
      CI_ACCESS_TOKEN:
        required: false
jobs:
  verify-repro:
    runs-on: ubuntu-latest
    steps:
    - run: env
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        submodules: ${{ inputs.submodules }}
        token: ${{ secrets.CI_ACCESS_TOKEN || github.token }}
        fetch-tags: true
        fetch-depth: 0
    - name: Install podman
      run: |
        sudo apt-get update
        sudo apt-get install podman
    - name: Checkout workflow scripts
      uses: actions/checkout@v6
      with:
        repository: mullvad/rsw-public
        ref: ${{ inputs.reusable-ref }}
        sparse-checkout: .github/workflows/scripts/
        path: workflow-scripts
    - name: Build release
      run: make ${{ inputs.release }}
    - name: Collect checksums and build registry
      id: build-registry
      run: |
        source ./workflow-scripts/.github/workflows/scripts/helpers.sh
        declare -A registry
        readarray -t artifacts < artifacts.list
        adapt_patterns artifacts
        for ap in ${artifacts[@]}; do
            checksum_single_file "$ap" registry
        done
        github_persist "registry" "$(serialize_registry registry)"
    - name: Clean artifacts
      run: make clean
    - name: Build release again
      run: make ${{ inputs.release }}
    - name: Collect and verify checksums
      run: |
        source ./workflow-scripts/.github/workflows/scripts/helpers.sh
        declare -A registry
        readarray -t artifacts < artifacts.list
        adapt_patterns artifacts
        for ap in ${artifacts[@]}; do
            checksum_single_file "$ap" registry
        done
        declare -A old_registry
        deserialize_registry "${{ steps.build-registry.outputs.registry }}" old_registry
        if ! compare_registries old_registry registry; then
            dump_registry "first run" old_registry
            dump_registry "second run" registry
            github_error "Reproducible builds verification has failed"
        fi
